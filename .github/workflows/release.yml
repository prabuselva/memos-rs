name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '24'
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_tag: ${{ steps.check_tag.outputs.is_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag or input
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate version format
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] && [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\-[r][c]\.[0-9]+$ ]]  then
            echo "Error: Version must be in format vX.Y.Z (e.g., v1.0.0)"
            exit 1
          fi
          echo "Valid version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Rust clippy
        run: cargo clippy --workspace --

  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    needs: [prepare, lint-and-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: memos-rs-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: memos-rs-linux-arm64
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            asset_name: memos-rs-linux-armv7
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: memos-rs-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: memos-rs-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: memos-rs-windows-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler toolchain
        if: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install cross-compiler toolchain
        if: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Perl
        if: ${{ matrix.os != 'macos-latest' }}
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            choco install strawberryperl -y
          else
            sudo apt-get update
            sudo apt-get install -y perl
          fi

      - name: Export Perl PATH (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          echo "PATH=/c/Strawberry/perl/bin:$PATH" >> $GITHUB_ENV

      - name: Check Perl availability (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          which perl || echo "Perl not found in PATH"
          perl --version | head -n 2

      - name: Install OpenSSL via Chocolatey (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          choco install openssl -y

      - name: Set OpenSSL environment variables (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          echo "OPENSSL_DIR=/c/Program Files/OpenSSL" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/c/Program Files/OpenSSL/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/c/Program Files/OpenSSL/include" >> $GITHUB_ENV
          echo "OPENSSL_NO_VENDOR=1" >> $GITHUB_ENV

      - name: Build Rust backend (Lite with embedded frontend)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
        shell: bash
        run: |
          echo "::group::Building Rust backend (Lite)"
          echo "Target: ${{ matrix.target }}"
          echo "Version: $VERSION"
          echo "PATH: $PATH"
          echo "OPENSSL_DIR: $OPENSSL_DIR"
          echo "OPENSSL_LIB_DIR: $OPENSSL_LIB_DIR"
          echo "OPENSSL_INCLUDE_DIR: $OPENSSL_INCLUDE_DIR"
          echo "OPENSSL_NO_VENDOR: $OPENSSL_NO_VENDOR"
          chmod +x build.sh
          ./build.sh --lite --embed-frontend --target ${{ matrix.target }}
          echo "::endgroup::"

      - name: Build Rust backend (Full with embedded frontend)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
        shell: bash
        run: |
          echo "::group::Building Rust backend (Full)"
          echo "Target: ${{ matrix.target }}"
          echo "Version: $VERSION"
          echo "PATH: $PATH"
          echo "OPENSSL_DIR: $OPENSSL_DIR"
          echo "OPENSSL_LIB_DIR: $OPENSSL_LIB_DIR"
          echo "OPENSSL_INCLUDE_DIR: $OPENSSL_INCLUDE_DIR"
          echo "OPENSSL_NO_VENDOR: $OPENSSL_NO_VENDOR"
          chmod +x build.sh
          ./build.sh --full --embed-frontend --target ${{ matrix.target }}
          echo "::endgroup::"

      - name: Create release archive (Lite)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          echo "::group::Debug information"
          echo "Matrix OS: ${{ matrix.os }}"
          echo "Target: ${{ matrix.target }}"
          echo "Asset name: ${{ matrix.asset_name }}"
          echo "Version: $VERSION"
          echo "Working directory: $(pwd)"
          echo "::endgroup::"
          
          mkdir -p release
          
          echo "::group::Checking binary existence"
          ls -la target/${{ matrix.target }}/release/* || true
          echo "::endgroup::"
          
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/memos-rs-lite.exe release/memos-rs-lite.exe || { echo "ERROR: Binary not found"; exit 1; }
            cd release && 7z a -tzip ../${{ matrix.asset_name }}-lite-v${VERSION#v}.zip memos-rs-lite.exe
          else
            cp target/${{ matrix.target }}/release/memos-rs-lite release/memos-rs-lite || { echo "ERROR: Binary not found"; exit 1; }
            cd release && tar -czf ../${{ matrix.asset_name }}-lite-v${VERSION#v}.tar.gz memos-rs-lite
          fi

      - name: Create release archive (Full)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          echo "::group::Debug information"
          echo "Matrix OS: ${{ matrix.os }}"
          echo "Target: ${{ matrix.target }}"
          echo "Asset name: ${{ matrix.asset_name }}"
          echo "Version: $VERSION"
          echo "Working directory: $(pwd)"
          echo "::endgroup::"
          
          mkdir -p release
          
          echo "::group::Checking binary existence"
          ls -la target/${{ matrix.target }}/release/* || true
          echo "::endgroup::"
          
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/memos-rs.exe release/memos-rs.exe || { echo "ERROR: Binary not found"; exit 1; }
            cd release && 7z a -tzip ../${{ matrix.asset_name }}-full-v${VERSION#v}.zip memos-rs.exe
          else
            cp target/${{ matrix.target }}/release/memos-rs release/memos-rs || { echo "ERROR: Binary not found"; exit 1; }
            cd release && tar -czf ../${{ matrix.asset_name }}-full-v${VERSION#v}.tar.gz memos-rs
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ matrix.asset_name }}-lite-${{ needs.prepare.outputs.version }}.*
            ${{ matrix.asset_name }}-full-${{ needs.prepare.outputs.version }}.*
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            ## Changes
            - Build for ${{ matrix.os }}
            - Embedded frontend in both binaries
            - Version: ${{ needs.prepare.outputs.version }}

            ## Installation

            ### Lite Version (SQLite only)
            ```bash
            # Linux/macOS
            tar -xzf ${{ matrix.asset_name }}-lite-${{ needs.prepare.outputs.version }}.tar.gz
            ./memos-rs-lite

            # Windows
            7z x ${{ matrix.asset_name }}-lite-${{ needs.prepare.outputs.version }}.zip
            .\memos-rs-lite.exe
            ```

            ### Full Version (with Vector DB, embeddings, LLM)
            ```bash
            # Linux/macOS
            tar -xzf ${{ matrix.asset_name }}-full-${{ needs.prepare.outputs.version }}.tar.gz
            ./memos-rs

            # Windows
            7z x ${{ matrix.asset_name }}-full-${{ needs.prepare.outputs.version }}.zip
            .\memos-rs.exe
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
