name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '18'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: memos-rs-linux-amd64
          - os: macOS-latest
            target: x86_64-apple-darwin
            asset_name: memos-rs-darwin-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: memos-rs-windows-amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build Rust backend (embedded frontend)
        run: cargo build --release --target ${{ matrix.target }} --features embed-frontend
        shell: bash

      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/memos-rs.exe release/
            cd release
            7z a -tzip ../${{ matrix.asset_name }}.zip memos-rs.exe
          else
            cp target/${{ matrix.target }}/release/memos-rs release/
            cd release
            tar -czf ../${{ matrix.asset_name }}.tar.gz memos-rs
          fi
          ls -la release/
          echo "Created release archive: ${{ matrix.asset_name }}.*"

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}.*
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## Changes
            - Build for ${{ matrix.os }}
            - Embedded frontend in single binary
            
            ## Installation
            Download the appropriate asset for your platform and extract it.
            
            ## Usage
            ```bash
            # Linux/macOS
            tar -xzf ${{ matrix.asset_name }}.tar.gz
            ./memos-rs
            
            # Windows
            7z x ${{ matrix.asset_name }}.zip
            .\memos-rs.exe
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (embedded)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/memos-rs:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/memos-rs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          file: Dockerfile.embedded

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Rust tests
        run: cargo test --workspace --no-fail-fast

      - name: Run frontend tests
        working-directory: frontend
        run: npm test || echo "No frontend tests configured"
